<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Task App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Login to your account</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            required 
            placeholder="Enter your email"
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            required 
            placeholder="Enter your password"
          >
        </div>

        <div id="errorMessage" class="error-message"></div>

        <button type="submit" class="btn-primary">Login</button>
      </form>

      <p class="auth-switch">
        Don't have an account? <a href="register.html">Create one</a><br>
        Forgot password? <a id="forgotPassword">Click here</a>
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.textContent = '';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('http://localhost:3000/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Store token in localStorage
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          // Redirect to dashboard/tasks page
          window.location.href = 'dashboard.html';
        } else {
          errorMessage.textContent = data.error || 'Login failed';
        }
      } catch (error) {
        errorMessage.textContent = 'Connection error. Make sure the server is running.';
        console.error('Error:', error);
      }
    });
  </script>
</body>
</html>
