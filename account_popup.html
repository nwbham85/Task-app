<!-- Key Features:

-Dual Purpose: Works for both Sign Up and Log In forms
-Required Fields: Username and Password inputs with validation
-Password Strength: Real-time password strength indicator for signup
-Confirm Password: Additional field for signup form
-Modern Design: Glassmorphism effects matching your car search theme
-Responsive: Works on mobile and desktop
-Interactive: Smooth animations and hover effects

Form Validation:

-Username: 3-20 characters required
-Password: Minimum 6 characters with strength checking
-Confirm Password: Must match original password (signup only)
-Real-time feedback: Shows what's needed for a strong password

User Experience:

Toggle between forms: "Already have an account?" link switches to login
Keyboard support: Escape key closes modal
Click outside: Closes modal when clicking the overlay
Animated transitions: Smooth open/close animations
Password strength indicator: Visual feedback with colors (red/orange/green) -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Modal</title>
    <script src="loginApi.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Modal Container */
        .modal {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            transform: scale(0.9) translateY(20px);
            transition: all 0.3s ease;
            position: relative;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        /* Close Button */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            color: #999;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-btn:hover {
            color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            transform: rotate(90deg);
        }

        /* Modal Header */
        .modal-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .modal-title {
            font-size: 2em;
            font-weight: 700;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .modal-subtitle {
            color: #666;
            font-size: 16px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
            background: white;
        }

        .form-group input::placeholder {
            color: #999;
        }

        /* Password Strength Indicator */
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .password-strength.weak .password-strength-bar {
            width: 33%;
            background: #ff4444;
        }

        .password-strength.medium .password-strength-bar {
            width: 66%;
            background: #ffaa00;
        }

        .password-strength.strong .password-strength-bar {
            width: 100%;
            background: #00aa44;
        }

        .password-text {
            font-size: 12px;
            margin-top: 5px;
            color: #666;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        /* Toggle Link */
        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .toggle-form a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .toggle-form a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* Demo Button */
        .demo-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .demo-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .modal {
                padding: 30px 20px;
                margin: 20px;
            }

            .modal-title {
                font-size: 1.5em;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Demo Button to Show Modal -->
    <button class="demo-btn" onclick="openModal('signup')">
        Open Sign Up Modal
    </button>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Sign Up</h2>
                <p class="modal-subtitle" id="modalSubtitle">Create your account to get started</p>
            </div>

            <form id="authForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Enter your username"
                        required
                        minlength="3"
                        maxlength="20"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                        minlength="6"
                        oninput="checkPasswordStrength()"
                    >
                    <div class="password-strength" id="passwordStrength">
                        <div class="password-strength-bar"></div>
                    </div>
                    <div class="password-text" id="passwordText"></div>
                </div>

                <div class="form-group" id="confirmPasswordGroup" style="display: none;">
                    <label for="confirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="Confirm your password"
                    >
                </div>

                <div class="button-group">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        Sign Up
                    </button>
                </div>
            </form>

            <div class="toggle-form">
                <span id="toggleText">Already have an account?</span>
                <a href="#" onclick="toggleForm()" id="toggleLink">Log in</a>
            </div>
        </div>
    </div>

    <script>
        let currentForm = 'signup';

        function openModal(formType = 'signup') {
            currentForm = formType;
            updateModalContent();
            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = 'auto';
            resetForm();
        }

        function toggleForm() {
            currentForm = currentForm === 'signup' ? 'login' : 'signup';
            updateModalContent();
            resetForm();
        }

        function updateModalContent() {
            const title = document.getElementById('modalTitle');
            const subtitle = document.getElementById('modalSubtitle');
            const submitBtn = document.getElementById('submitBtn');
            const toggleText = document.getElementById('toggleText');
            const toggleLink = document.getElementById('toggleLink');
            const confirmPasswordGroup = document.getElementById('confirmPasswordGroup');
            const passwordStrength = document.getElementById('passwordStrength');

            if (currentForm === 'signup') {
                title.textContent = 'Sign Up';
                subtitle.textContent = 'Create your account to get started';
                submitBtn.textContent = 'Sign Up';
                toggleText.textContent = 'Already have an account?';
                toggleLink.textContent = 'Log in';
                confirmPasswordGroup.style.display = 'block';
                passwordStrength.style.display = 'block';
            } else {
                title.textContent = 'Log In';
                subtitle.textContent = 'Welcome back! Please sign in';
                submitBtn.textContent = 'Log In';
                toggleText.textContent = "Don't have an account?";
                toggleLink.textContent = 'Sign up';
                confirmPasswordGroup.style.display = 'none';
                passwordStrength.style.display = 'none';
            }
        }

        function resetForm() {
            document.getElementById('authForm').reset();
            document.getElementById('passwordStrength').className = 'password-strength';
            document.getElementById('passwordText').textContent = '';
        }

        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthIndicator = document.getElementById('passwordStrength');
            const strengthText = document.getElementById('passwordText');

            if (password.length === 0) {
                strengthIndicator.className = 'password-strength';
                strengthText.textContent = '';
                return;
            }

            let strength = 0;
            let feedback = [];

            // Length check
            if (password.length >= 8) strength++;
            else feedback.push('at least 8 characters');

            // Uppercase check
            if (/[A-Z]/.test(password)) strength++;
            else feedback.push('uppercase letter');

            // Lowercase check
            if (/[a-z]/.test(password)) strength++;
            else feedback.push('lowercase letter');

            // Number check
            if (/[0-9]/.test(password)) strength++;
            else feedback.push('number');

            // Special character check
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            else feedback.push('special character');

            if (strength <= 2) {
                strengthIndicator.className = 'password-strength weak';
                strengthText.textContent = 'Weak - Add: ' + feedback.slice(0, 2).join(', ');
            } else if (strength <= 3) {
                strengthIndicator.className = 'password-strength medium';
                strengthText.textContent = 'Medium - Add: ' + feedback.slice(0, 1).join(', ');
            } else {
                strengthIndicator.className = 'password-strength strong';
                strengthText.textContent = 'Strong password!';
            }
        }

        function handleSubmit(event) {
            event.preventDefault();
            
            const formData = new FormData(event.target);
            const username = formData.get('username');
            const password = formData.get('password');
            const confirmPassword = formData.get('confirmPassword');

            // Basic validation
            if (username.length < 3) {
                alert('Username must be at least 3 characters long');
                return;
            }

            if (password.length < 6) {
                alert('Password must be at least 6 characters long');
                return;
            }

            if (currentForm === 'signup' && password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            // Simulate API call
            console.log(`${currentForm} attempt:`, { username, password });
            alert(`${currentForm} successful! (This is a demo)`);
            closeModal();
        }

        // Close modal when clicking outside
document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) {
        closeModal();
    }
});

// Close modal with Escape key
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeModal();
    }
});


    </script>
</body>
</html>
