<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Settings - Task App</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .settings-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }

    .settings-card {
      background: white;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
    }

    .settings-section {
      margin-bottom: 30px;
    }

    .settings-section h3 {
      color: #333;
      margin-bottom: 15px;
      font-size: 18px;
    }

    .profile-info {
      display: grid;
      gap: 15px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #f9f9f9;
      border-radius: 6px;
    }

    .info-label {
      font-weight: 600;
      color: #666;
    }

    .info-value {
      color: #333;
    }

    .success-message {
      background: #d4edda;
      color: #155724;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }

    .back-link {
      color: #007bff;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 20px;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="settings-container">
    <a href="dashboard.html" class="back-link">← Back to Dashboard</a>

    <div class="settings-card">
      <div class="settings-header">
        <h1>Profile Settings</h1>
      </div>

      <div id="successMessage" class="success-message"></div>

      <!-- View Mode -->
      <div id="viewMode">
        <div class="settings-section">
          <h3>Account Information</h3>
          <div class="profile-info">
            <div class="info-row">
              <span class="info-label">Email:</span>
              <span class="info-value" id="displayEmail">-</span>
            </div>
            <div class="info-row">
              <span class="info-label">Username:</span>
              <span class="info-value" id="displayUsername">-</span>
            </div>
            <div class="info-row">
              <span class="info-label">First Name:</span>
              <span class="info-value" id="displayFirstName">-</span>
            </div>
            <div class="info-row">
              <span class="info-label">Last Name:</span>
              <span class="info-value" id="displayLastName">-</span>
            </div>
          </div>
        </div>

        <button id="editProfileBtn" class="btn-primary">Edit Profile</button>
      </div>

      <!-- Edit Mode -->
      <div id="editMode" style="display: none;">
        <form id="profileForm">
          <div class="settings-section">
            <h3>Edit Profile</h3>
            
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" required>
            </div>

            <div class="form-group">
              <label for="username">Username</label>
              <input type="text" id="username" required>
            </div>

            <div class="form-group">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName">
            </div>

            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName">
            </div>
          </div>

          <div class="modal-actions">
            <button type="button" id="cancelBtn" class="btn-secondary">Cancel</button>
            <button type="submit" class="btn-primary">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="profile.js"></script>
</body>
</html>
