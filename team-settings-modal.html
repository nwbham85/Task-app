<div class="modal teamSettings" id="teamSettingsModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Team Settings</h2>
      <button class="close-modal" id="closeTeamSettings">&times;</button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label for="newTeamName">Create team</label>
        <input
          type="text"
          id="newTeamName"
          placeholder="e.g. Product"
        />
      </div>

      <button class="btn-primary" id="addTeamBtn">
        Add team
      </button>
    </div>
  </div>
</div>
