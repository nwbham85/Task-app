<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="main.css">
  <script type="module" src="main.js"></script>
<style>

* {
  padding:0;
  margin:0;
  box-sizing: border-box;
}

.app {
  padding:10px;
}
.navbar {
  display:flex;
  justify-content: right;
  gap:10px;
  border:2px solid black;
  padding:20px;
  border-radius: 10px;
  margin-bottom: 5px;
}

.navbar .navBtn {
  color:black;
  font-weight: 700;
  padding:5px;
  border-radius: 10px;
}

.navBtn:hover {
  color:lightseagreen;
  cursor: pointer;
}
      /* directory */

.directory {
  
}
.nonprofit-card {
  display:flex;
  flex-direction: column;
  gap:10px;
  border:1px solid black;
  border-radius: 10px;
  padding:20px;
  margin:10px;
}

.nonprofit-card :nth-child(1) {
  margin-top:10px;
}

.nonprofit-card .rolesList {
  list-style:disc;
  padding-left:10px;
}

.rolesList {
  display:flex;
  flex-direction: column;
}

.roleItem {
  display:flex;
  justify-content: space-between;
}

</style>
</head>
<body>
<section class="app">

  <nav class="navbar">
    <button type = 'button' class="navBtn register" name="register">Register</button>
    <button type = 'button' class="navBtn login" name="login">Login</button>
  </nav>

  <section class="directory">
    <h3 class="directory-header">Directory</h3>
      <div class="nonprofit-card">
        <p>Name: <span class="nonprofit-name">Foodbank</span></p>
        <p>About us:</p>
        <p>Positions available: <span class="positionAmt">2</span></p>
        
          <ul class="rolesList">
            <p>Roles:</p>
            <li class="roleItem">Bagger<span class="descrip">Description: put food in bags.</span><span class="hoursNeeded"> 5hrs</span><span class="payout">Payout: $100</span><span><button class="apply">Apply</button></button></span></li>
            <li class="roleItem">other</li>
          </ul>
      </div>

      <div class="nonprofit-card">
        <p>Name: <span class="nonprofit-name">Foodbank</span></p>
        <p>About us:</p>
        <p>Positions available: <span class="positionAmt">2</span></p>
        
          <ul class="rolesList">
            <p>Roles:</p>
            <li class="roleItem">Bagger<span class="hoursNeeded"> 5hrs</span><span class="payout">Payout: $100</span><span><button class="apply">Apply</button></button></span></li>
            <li class="roleItem">other</li>
          </ul>
      </div>
  </section>


  <section class="comment-container">
    <div class="comment-header">
      <h3>Comments</h3>
      <input type="text" class="input" name="comment" required minlength="2" maxlength="150" placeholder="type your comment...">
      <button type="button" class="postBtn" name="submit-comment">Send</button>
    </div>
    <div class="comments">
      <!-- content added through js -->
        
    </div>
  </section>

  <section>
    <button id="loadTest">Load Test Data</button>
    <div class="output"></div>
  </section>

</section>
  



<!-- login modal -->
<div class="modal">
  <div class="modal-content">
    <span class="modal-close">&times;</span>

    <h3>Login</h3>

    <div class="input">
      <input
        type="text"
        class="login-username"
        required
        minlength="2"
        placeholder="username"
      >

      <input
        type="password"
        class="login-password"
        required
        minlength="5"
        placeholder="password"
      >

      <button type="button" class="loginBtn">Login</button>
    </div>
  </div>
</div>

<!--  -->

<!-- register modal -->

<div class="modal">
  <div class="modal-content">
    <span class="modal-close">&times;</span>

    <h3>Register</h3>

    <div class="input">
      <input
        type="text"
        class="register-username"
        required
        minlength="2"
        placeholder="type username"
      >

      <input
        type="password"
        class="register-password"
        required
        minlength="5"
        placeholder="create password of five characters"
      >

      <button type="button" class="registerBtn">Create Account</button>
    </div>
  </div>
</div>


</body>
</html>
