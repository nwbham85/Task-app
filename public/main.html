<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="main.css">
  <script type="module" src="main.js"></script>
<style>

* {
  padding:0;
  margin:0;
  box-sizing: border-box;
}

.app {
  padding:10px;
}
.navbar {
  display:flex;
  justify-content: right;
  gap:10px;
  border:2px solid black;
  padding:20px;
  border-radius: 10px;
  margin-bottom: 5px;
}

.navbar .navBtn {
  color:black;
  font-weight: 700;
  padding:5px;
  border-radius: 10px;
}

.navBtn:hover {
  color:lightseagreen;
  cursor: pointer;
}

</style>
</head>
<body>
<section class="app">
  <nav class="navbar">
    <button type = 'button' class="navBtn register" name="register">Register</button>
    <button type = 'button' class="navBtn login" name="login">Login</button>
  </nav>


  <section class="comment-container">
    <div class="comment-header">
      <h3>Comments</h3>
      <input type="text" class="input" name="comment" required minlength="2" maxlength="150" placeholder="type your comment...">
      <button type="button" class="postBtn" name="submit-comment">Send</button>
    </div>
    <div class="comments">
      <!-- content added through js -->
        
    </div>
  </section>

</section>
  



<!-- login modal -->
<div class="modal">
  <div class="modal-content">
    <span class="modal-close">&times;</span>

    <h3>Login</h3>

    <div class="input">
      <input
        type="text"
        class="login-username"
        required
        minlength="2"
        placeholder="username"
      >

      <input
        type="password"
        class="login-password"
        required
        minlength="5"
        placeholder="password"
      >

      <button type="button" class="loginBtn">Login</button>
    </div>
  </div>
</div>

<!--  -->

</body>
</html>
