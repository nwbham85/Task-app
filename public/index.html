<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Create Task</h1>

  <div class="task">
    <label>Task title:</label>
    <input type="text" id="taskTitle" placeholder="task title">
    <label>Description:</label>
    <input type="text" id="description" placeholder="task description">
    <button id="createtaskBtn">Create Tasks</button>
  </div>

  <div class="displayTask">
    <h1>Tasks</h1>
    <h3 id="taskTitle" name="taskTitle"></h3>
    <p id="description" name="description"></p>
    <p id="date" name="date"></p>
  </div>

  
  <script src="main.js"></script>
</body>
</html>
