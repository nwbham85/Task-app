<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="modal.css">
</head>


</head>
<body>

  <div class="dashboard">

    <aside class="sidebar">
      <h2>Dashboard</h2>
      <a href="#">Home</a>
      <a href="profile.html">My Profile</a>
      <a href="#">Messages</a>
      <a href="#">Followers</a>
      <a href="#">Settings</a>
      <a href="login.html">Login</a>
    </aside>

    <main class="main">

      <div class="topbar">
        <input class="search-bar" type="text" placeholder="Search posts, users, or comments..." />
        <div class="profile-badge">Nathan Winslow</div>
      </div>

      <section class="create-post">
        <h3>Create Post</h3>
        <input class="title" required placeholder="title">
        <textarea class="text" placeholder="What's on your mind?" required maxlength="4000"></textarea>

        <div class="btn-row">
          <button class="primary">Create</button>
          <button class="success">Save Draft</button>
          <button class="secondary">Clear</button>
        </div>
      </section>

      <!-- post-list -->
       <section class="post-list">
           <!-- content generated dynamically  -->
       </section>

      

      

    </main>

    <aside class="right-panel">
      <h3>Users</h3>

      <div class="user-card">
        <div class="user-info">
          <span class="username">Sarah Johnson</span>
          <span class="user-role">Frontend Developer</span>
        </div>
        <div>
          <button class="primary">Follow</button>
          <button class="message-btn">Message</button>
        </div>
      </div>

      <div class="user-card">
        <div class="user-info">
          <span class="username">Mike Adams</span>
          <span class="user-role">Designer</span>
        </div>
        <div>
          <button class="primary">Follow</button>
          <button class="message-btn">Message</button>
        </div>
      </div>

      <div class="user-card">
        <div class="user-info">
          <span class="username">Alex Carter</span>
          <span class="user-role">Content Creator</span>
        </div>
        <div>
          <button class="primary">Follow</button>
          <button class="message-btn">Message</button>
        </div>
      </div>

    </aside>

  </div>


    


    <script type="module" src='main.js'></script>

 <!-- edit post modal -->
<div class="edit-modal hidden">
  <div class="edit-modal-content">
    <h3>Edit Post</h3>

    <input class="edit-title-input" type="text" />
    <textarea class="edit-text-input"></textarea>

    <div class="btn-row">
      <button class="primary save-edit-btn">Save</button>
      <button class="secondary cancel-edit-btn">Cancel</button>
    </div>
  </div>
</div>





</body>
</html>
