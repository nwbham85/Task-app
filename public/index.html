<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Your Tasks</h1>

  <div class="card">
    <label>User ID:</label>
    <input type="text" id="userId" placeholder="Enter your user ID">
    <button id="loadTasksBtn">Load My Tasks</button>
  </div>

  <div class="card">
    <h2>Create a Task</h2>
    <input type="text" id="taskTitle" placeholder="Task title">
    <textarea id="taskDesc" placeholder="Task description"></textarea>
    <button id="createTaskBtn">Create Task</button>
  </div>

  <div class="card">
    <h2>My Tasks</h2>
    <ul id="taskList"></ul>
  </div>

  <script src="main.js"></script>
</body>
</html>
