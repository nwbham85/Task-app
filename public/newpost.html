<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>
    
    

    <form method="POST" action="/api/newpost" class="form" id="form">

        <h2>Add Person</h2>
        <ul>

            <li>
            <label for = "firstName">First Name</label>
            <input type = "text" name="firstName" id="firstName" maxlength="25" required>
            </li>

            <li>
            <label for = "firstLetter">First letter of last name</label>
            <input type = "text" name="firstLetter" id="firstLetter" maxlength="1" required>
            </li>

            <li>
            <label for="email">Email (optional)</label>
            <input type="email" name="email" id="email" maxlength="50">
            </li>

            <li>
            <label for="phone">Phone # (optional)</label>
            <input type="tel" name="phone" id="phone" pattern="\d{10}" >
            </li>

            <li>
            <label for="driver">Last four digits of Driver's License (optional)</label>
            <input type="text" name="driver" id="driver" minlength="4" maxlength="4">
            </li>

            <p>Your relationship:</p>
            <div class="relationship">
                <input type="radio" name="relationship" id="exWife" value="exWife" required >
                <label for="exWife">Ex Wife</label>
                <input type="radio" name="relationship" id="exGirlFriend" value="exGirlFriend" required >
                <label for="exGirlFriend">Ex Girl Friend</label>
                <input type="radio" name="relationship" id="other" value="other" required >
                <label for="other">Other</label>
            </div>
            <p>State:</p>
                <div>
                <input type="radio" name="state" id="alabama" value="alabama" checked>
                <label for="alabama">Alabama</label>
                </div>

            <button type="reset">Reset</button>
            <button type="submit">Add this person</button>

            <h3 class="success hidden" >Post created</h3>
        </ul>
    </form>
<script src="newpost.js"></script>
</body>
</html>
