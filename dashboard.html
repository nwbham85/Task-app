<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Task App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-body">
  <!-- Header -->
  <header class="dashboard-header">
    <div class="header-content">
      <h2>Task Manager</h2>
      <div class="header-right">
        <span class="user-greeting">Welcome, <strong id="userName"></strong></span>
        <button id="logoutBtn" class="btn-secondary">Logout</button>
        <button id="settingsBtn" class="btn-secondary" onclick="window.location.href='profile.html'">⚙️ Settings</button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="stats-card">
        <h3>Your Stats</h3>
        <div class="stat-item">
          <span class="stat-label">Total Tasks</span>
          <span class="stat-value" id="totalTasks">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">To Do</span>
          <span class="stat-value" id="todoCount">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">In Progress</span>
          <span class="stat-value" id="inProgressCount">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Done</span>
          <span class="stat-value" id="doneCount">0</span>
        </div>
        <div class="stat-item danger">
          <span class="stat-label">Overdue</span>
          <span class="stat-value" id="overdueCount">0</span>
        </div>
      </div>

      <div class="filter-section">
        <h3>Filter Tasks</h3>
        <select id="statusFilter" class="filter-select">
          <option value="">All Status</option>
          <option value="todo">To Do</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>
        
        <select id="priorityFilter" class="filter-select">
          <option value="">All Priority</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="urgent">Urgent</option>
        </select>
      </div>
    </aside>

    <!-- Main Tasks Area -->
    <main class="main-content">
      <div class="content-header">
        <h1>My Tasks</h1>
        <button id="newTaskBtn" class="btn-primary">+ New Task</button>
      </div>

      <div id="tasksContainer" class="tasks-grid">
        <!-- Tasks will be loaded here -->
      </div>

      <div id="emptyState" class="empty-state">
        <p>No tasks yet. Create your first task to get started!</p>
      </div>
    </main>
  </div>

  <!-- Modal for Creating/Editing Tasks -->
  <div id="taskModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Create New Task</h2>
        <button class="close-modal">&times;</button>
      </div>
      
      <form id="taskForm">
        <input type="hidden" id="taskId">
        
        <div class="form-group">
          <label for="taskTitle">Title *</label>
          <input type="text" id="taskTitle" required placeholder="Enter task title">
        </div>

        <div class="form-group">
          <label for="taskDescription">Description</label>
          <textarea id="taskDescription" rows="3" placeholder="Add details about your task"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="taskStatus">Status</label>
            <select id="taskStatus">
              <option value="todo">To Do</option>
              <option value="in_progress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>

          <div class="form-group">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority">
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="taskDueDate">Due Date</label>
          <input type="date" id="taskDueDate">
        </div>

        <div class="form-group">
          <label for="taskTags">Tags (comma separated)</label>
          <input type="text" id="taskTags" placeholder="e.g. work, urgent, meeting">
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary cancel-btn">Cancel</button>
          <button type="submit" class="btn-primary">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Check authentication
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');

    if (!token) {
      window.location.href = 'login.html';
    }

    // Display user name
    document.getElementById('userName').textContent = user.username || 'User';

    // API Helper
    async function apiCall(endpoint, options = {}) {
      const response = await fetch(`http://localhost:3000${endpoint}`, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
          ...options.headers
        }
      });

      if (response.status === 401) {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'login.html';
        return;
      }

      return response.json();
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    });

    // Load Tasks
    async function loadTasks() {
      const statusFilter = document.getElementById('statusFilter').value;
      const priorityFilter = document.getElementById('priorityFilter').value;

      let url = '/api/tasks?';
      if (statusFilter) url += `status=${statusFilter}&`;
      if (priorityFilter) url += `priority=${priorityFilter}&`;

      const tasks = await apiCall(url);
      displayTasks(tasks);
      updateStats(tasks);
    }

    // Display Tasks
    function displayTasks(tasks) {
      const container = document.getElementById('tasksContainer');
      const emptyState = document.getElementById('emptyState');

      if (!tasks || tasks.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      container.innerHTML = tasks.map(task => `
        <div class="task-card" data-id="${task._id}">
          <div class="task-header">
            <h3>${task.title}</h3>
            <div class="task-actions">
              <button class="btn-icon edit-task" data-id="${task._id}">✏️</button>
              <button class="btn-icon delete-task" data-id="${task._id}">🗑️</button>
            </div>
          </div>
          
          ${task.description ? `<p class="task-description">${task.description}</p>` : ''}
          
          <div class="task-meta">
            <span class="badge badge-${task.status}">${task.status.replace('_', ' ')}</span>
            <span class="badge badge-priority-${task.priority}">${task.priority}</span>
          </div>
          
          ${task.dueDate ? `
            <div class="task-due-date ${new Date(task.dueDate) < new Date() && task.status !== 'done' ? 'overdue' : ''}">
              📅 ${new Date(task.dueDate).toLocaleDateString()}
            </div>
          ` : ''}
          
          ${task.tags && task.tags.length > 0 ? `
            <div class="task-tags">
              ${task.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
            </div>
          ` : ''}
        </div>
      `).join('');

      // Add event listeners for edit and delete
      document.querySelectorAll('.edit-task').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const taskId = e.target.dataset.id;
          editTask(taskId, tasks);
        });
      });

      document.querySelectorAll('.delete-task').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const taskId = e.target.dataset.id;
          deleteTask(taskId);
        });
      });
    }

    // Update Stats
    function updateStats(tasks) {
      document.getElementById('totalTasks').textContent = tasks.length;
      document.getElementById('todoCount').textContent = tasks.filter(t => t.status === 'todo').length;
      document.getElementById('inProgressCount').textContent = tasks.filter(t => t.status === 'in_progress').length;
      document.getElementById('doneCount').textContent = tasks.filter(t => t.status === 'done').length;
      
      const overdue = tasks.filter(t => 
        t.dueDate && new Date(t.dueDate) < new Date() && t.status !== 'done'
      ).length;
      document.getElementById('overdueCount').textContent = overdue;
    }

    // Modal Management
    const modal = document.getElementById('taskModal');
    const newTaskBtn = document.getElementById('newTaskBtn');
    const closeModalBtns = document.querySelectorAll('.close-modal, .cancel-btn');

    newTaskBtn.addEventListener('click', () => {
      document.getElementById('modalTitle').textContent = 'Create New Task';
      document.getElementById('taskForm').reset();
      document.getElementById('taskId').value = '';
      modal.style.display = 'flex';
    });

    closeModalBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        modal.style.display = 'none';
      });
    });

    window.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.style.display = 'none';
      }
    });

    // Create/Update Task
    document.getElementById('taskForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const taskId = document.getElementById('taskId').value;
      const taskData = {
        title: document.getElementById('taskTitle').value,
        description: document.getElementById('taskDescription').value,
        status: document.getElementById('taskStatus').value,
        priority: document.getElementById('taskPriority').value,
        dueDate: document.getElementById('taskDueDate').value || null,
        tags: document.getElementById('taskTags').value
          .split(',')
          .map(t => t.trim())
          .filter(t => t.length > 0)
      };

      if (taskId) {
        // Update existing task
        await apiCall(`/api/tasks/${taskId}`, {
          method: 'PATCH',
          body: JSON.stringify(taskData)
        });
      } else {
        // Create new task
        await apiCall('/api/tasks', {
          method: 'POST',
          body: JSON.stringify(taskData)
        });
      }

      modal.style.display = 'none';
      loadTasks();
    });

    // Edit Task
    function editTask(taskId, tasks) {
      const task = tasks.find(t => t._id === taskId);
      if (!task) return;

      document.getElementById('modalTitle').textContent = 'Edit Task';
      document.getElementById('taskId').value = task._id;
      document.getElementById('taskTitle').value = task.title;
      document.getElementById('taskDescription').value = task.description || '';
      document.getElementById('taskStatus').value = task.status;
      document.getElementById('taskPriority').value = task.priority;
      document.getElementById('taskDueDate').value = task.dueDate ? task.dueDate.split('T')[0] : '';
      document.getElementById('taskTags').value = task.tags ? task.tags.join(', ') : '';

      modal.style.display = 'flex';
    }

    // Delete Task
    async function deleteTask(taskId) {
      if (!confirm('Are you sure you want to delete this task?')) return;

      await apiCall(`/api/tasks/${taskId}`, {
        method: 'DELETE'
      });

      loadTasks();
    }

    // Filters
    document.getElementById('statusFilter').addEventListener('change', loadTasks);
    document.getElementById('priorityFilter').addEventListener('change', loadTasks);

    // Initial Load
    loadTasks();
  </script>
</body>
</html>
