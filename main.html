<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>


  <section class="comment-container">
    <div class="comment-header">
      <h3>Comments</h3>
      <input type="text" class="input" name="comment" required minlength="2" maxlength="150" placeholder="type your comment...">
      <button type="button" class="postBtn" name="submit-comment">Send</button>
    </div>
    <div class="comments">
      <p class="comment">Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas corporis ullam accusantium eos perferendis provident fugiat saepe, adipisci, ab molestiae, dignissimos voluptates optio voluptatem ut.</p><span><button class='editBtn' type='click'>Edit</button></span>
    </div>
    <div class="comment-footer">
      <p class="postDate">test</p><span class="postCreator">john</span><span class="tags">#tag</span>
    </div>
  </section>

  



<script>
  document.querySelector('.postBtn').addEventListener('click', async () => {
    const input = document.querySelector('input[name="comment"]');
    const text = input.value.trim();

    if (!text) return;

    const res = await fetch('/comments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ comment: text, creator: 'john', tags: '#tag' })
    });

    const data = await res.json();
    console.log('Saved:', data);
    input.value = '';
  });
</script>
</body>
</html>
